<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixtape - Spotify Walkman</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Muli:wght@400;600;700&family=Permanent+Marker&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        :root {
            --bg-cream: #f8f4e8;
            --bg-warm: #f2dec9;
            --ink: #2b2b2b;
            --muted: #605c56;
            --accent: #f55555;
            --accent-deep: #ce3a3a;
            --sun: #fccf31;
            --card: #fffdf8;
            --shadow: rgba(20, 20, 20, 0.15);
            --ok: #1f8b4c;
            --cover-overlay-top: 5% !important;
            --cover-overlay-side: 5%;
            --cover-overlay-bottom: 8% !important;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            background:
                radial-gradient(circle at 10% 10%, rgba(252, 207, 49, 0.15), transparent 30%),
                radial-gradient(circle at 85% 30%, rgba(245, 85, 85, 0.13), transparent 28%),
                linear-gradient(135deg, var(--bg-cream), var(--bg-warm));
            padding: 20px 18px 32px;
            margin: 0;
            font-family: 'Muli', sans-serif;
            color: var(--ink);
        }

        .main-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            gap: 28px;
            margin: 28px 0 12px;
            flex-wrap: wrap;
            width: 100%;
        }

        .player-section {
            flex: 1;
            min-width: 300px;
        }

        .cassette-section {
            flex: 1;
            min-width: 300px;
        }

        .cassette-container {
            width: 100%;
            border-radius: 16px;
            padding: 16px;
            background: linear-gradient(155deg, rgba(255, 255, 255, 0.72), rgba(255, 255, 255, 0.38));
            box-shadow: 0 10px 35px var(--shadow);
            backdrop-filter: blur(2px);
        }

        .cassette-art {
            position: relative;
            width: 100%;
            line-height: 0;
        }

        .cassette-cover {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 14px;
            box-shadow: 0 12px 22px rgba(0, 0, 0, 0.26);
            transition: filter 0.3s ease, transform 0.3s ease;
        }

        .cassette-cover.is-blurred {
            filter: blur(3px) saturate(0.9);
            transform: scale(1.01);
        }

        .playlist-overlay {
            position: absolute;
            top: var(--cover-overlay-top);
            left: var(--cover-overlay-side);
            right: var(--cover-overlay-side);
            bottom: var(--cover-overlay-bottom);
            background: rgba(0,0,0,0.05);
            border-radius: 6px;
            padding: 0;
            display: none;
            overflow: hidden;
            z-index: 2;
        }

        .playlist-overlay iframe {
            position: absolute;
            inset: 0;
            width: 100% !important; 
            height: 400px !important;
            max-height: 100% !important;
            min-height: 400px !important;
            display: block;
            border-radius: 6px;
            border: none;
        }

        #walkman {
            width: 100%;
            max-width: 800px;
            filter: drop-shadow(0 14px 24px rgba(0, 0, 0, 0.2));
        }

        #forwardbutton, #playbutton, #pausebutton, #stopbutton {
            cursor: pointer;
        }

        #rumble-toggle {
            cursor: pointer;
        }

        #rumble-toggle.rumble-disabled {
            opacity: 0.45;
            cursor: not-allowed;
            pointer-events: none;
        }

        #rumble-button {
            fill: #3b3b3b;
            stroke: #f7d84d;
            stroke-width: 2.5;
            rx: 8;
            transition: fill 0.2s ease, filter 0.2s ease, stroke 0.2s ease;
        }

        #rumble-shadow {
            fill: rgba(0, 0, 0, 0.28);
            pointer-events: none;
        }

        #rumble-label {
            fill: #ffffff;
            font-family: 'Muli', sans-serif;
            font-weight: 700;
            font-size: 8px;
            letter-spacing: 0.7px;
            pointer-events: none;
        }

        #rumble-hint {
            fill: #f8e9c8;
            font-family: 'Permanent Marker', cursive;
            font-size: 10px;
            letter-spacing: 0.8px;
            pointer-events: none;
        }

        #rumble-info {
            cursor: pointer;
        }

        #rumble-info-dot {
            fill: #2b2b2b;
            stroke: #f8e9c8;
            stroke-width: 1.6;
        }

        #rumble-info-label {
            fill: #f8e9c8;
            font-family: 'Muli', sans-serif;
            font-size: 9px;
            font-weight: 700;
            pointer-events: none;
        }

        #rumble-tooltip {
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        #rumble-tooltip.open {
            opacity: 1;
        }

        #rumble-tooltip-bg {
            fill: rgba(30, 30, 30, 0.92);
            stroke: rgba(248, 233, 200, 0.75);
            stroke-width: 1.2;
        }

        #rumble-tooltip-text {
            fill: #f8e9c8;
            font-family: 'Muli', sans-serif;
            font-size: 7px;
            font-weight: 600;
            letter-spacing: 0.2px;
        }

        #rumble-toggle.rumble-tap-flash #rumble-button {
            fill: #ff7ab8;
            stroke: #ffffff;
            filter: drop-shadow(0 0 8px rgba(255, 122, 184, 0.95));
        }

        #rumble-toggle.rumble-on #rumble-button {
            fill: #f55555;
            stroke: #ffffff;
            filter: drop-shadow(0 0 8px rgba(245, 85, 85, 0.85));
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            text-align: center;
            max-width: 1200px;
            margin: 0 auto;
        }

        .container__header {
            background-image: linear-gradient(135deg, #FCCF31 0%, #F55555 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-family: 'Luckiest Guy', cursive;
            font-size: clamp(2.5rem, 5vw, 4.7rem);
            letter-spacing: 1px;
            margin: 14px 0 8px;
            text-shadow: 0 8px 20px rgba(245, 85, 85, 0.16);
        }

        .container__paragraph {
            color: var(--muted);
            max-width: 750px;
            font-family: 'Muli', sans-serif;
            font-size: clamp(1rem, 1.9vw, 1.12rem);
            line-height: 1.65;
            margin: 0;
        }

        #form {
            width: min(760px, 100%);
            margin-top: 20px;
            padding: 18px 18px 16px;
            border-radius: 16px;
            background: rgba(255, 255, 255, 0.72);
            border: 1px solid rgba(255, 255, 255, 0.75);
            box-shadow: 0 8px 30px var(--shadow);
        }

        .form__input {
            box-sizing: border-box;
            padding: 15px 12px;
            color: var(--ink);
            border: 2px dashed rgba(252, 207, 49, 0.95);
            width: 100%;
            text-align: center;
            margin: 0;
            font-size: 17px;
            border-radius: 12px;
            background: #fffefb;
            transition: border-color .2s ease-in, box-shadow .2s ease-in;
        }

        .form__input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(245, 85, 85, 0.14);
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .share-button {
            background: linear-gradient(135deg, var(--sun) 0%, var(--accent) 100%);
            color: white;
            border: none;
            padding: 12px 22px;
            font-size: 16px;
            font-family: 'Muli', sans-serif;
            font-weight: 700;
            border-radius: 999px;
            cursor: pointer;
            margin: 0;
            transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            box-shadow: 0 8px 20px rgba(245, 85, 85, 0.24);
        }

        .load-button {
            background: linear-gradient(135deg, #f7d84d 0%, #f1b22d 100%);
            color: #2a2a2a;
            box-shadow: 0 8px 20px rgba(241, 178, 45, 0.28);
        }

        .share-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 22px rgba(245, 85, 85, 0.3);
        }

        .share-button:active {
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(245, 85, 85, 0.22);
        }

        .share-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        #playbutton.play-ready {
            stroke: #46cc76;
            stroke-width: 5;
            filter: drop-shadow(0 0 8px rgba(70, 204, 118, 0.9));
            animation: playReadyPulse 1.1s ease-in-out infinite;
        }

        #playbutton.play-active {
            stroke: #ff4fa4;
            stroke-width: 5;
            filter: drop-shadow(0 0 8px rgba(255, 79, 164, 0.9));
            animation: playActivePulse 1.1s ease-in-out infinite;
        }

        @keyframes playReadyPulse {
            0% {
                stroke-width: 4;
                filter: drop-shadow(0 0 3px rgba(70, 204, 118, 0.45));
            }
            50% {
                stroke-width: 6.5;
                filter: drop-shadow(0 0 12px rgba(70, 204, 118, 1));
            }
            100% {
                stroke-width: 4;
                filter: drop-shadow(0 0 3px rgba(70, 204, 118, 0.45));
            }
        }

        @keyframes playActivePulse {
            0% {
                stroke-width: 4;
                filter: drop-shadow(0 0 3px rgba(255, 79, 164, 0.45));
            }
            50% {
                stroke-width: 6.5;
                filter: drop-shadow(0 0 12px rgba(255, 79, 164, 1));
            }
            100% {
                stroke-width: 4;
                filter: drop-shadow(0 0 3px rgba(255, 79, 164, 0.45));
            }
        }

        .meta-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 12px;
            flex-wrap: wrap;
            text-align: left;
        }

        .share-feedback {
            min-height: 22px;
            margin: 0;
            font-size: 14px;
            color: var(--muted);
        }

        .share-feedback.success {
            color: var(--ok);
        }

        .share-feedback.error {
            color: var(--accent-deep);
        }

        .player-status {
            margin: 0;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #3e3c39;
            padding: 6px 12px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.85);
            border: 1px solid rgba(0, 0, 0, 0.08);
        }

        .player-status.playing {
            color: #176f3d;
        }

        .cover-note {
            margin: 12px 0 0;
            font-family: 'Permanent Marker', cursive;
            letter-spacing: 0.6px;
            color: #704f2b;
            font-size: 18px;
        }

        .panel-close {
            display: none;
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 4;
            border: 1px solid rgba(255, 255, 255, 0.7);
            background: rgba(32, 32, 32, 0.85);
            color: #ffffff;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.6px;
            padding: 6px 12px;
            cursor: pointer;
        }

        #mobile-panel-scrim {
            display: none;
        }

        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
                align-items: center;
                padding: 0;
                gap: 20px;
            }

            .player-section {
                min-width: auto;
                width: 100%;
            }

            .cassette-section {
                flex: none;
                width: 100%;
                max-width: 560px;
            }

        }

        @media (max-width: 700px) {
            :root {
                --cover-overlay-top: 14.5%;
                --cover-overlay-side: 2%;
                --cover-overlay-bottom: 3.5%;
            }

            body.mobile-panel-open {
                overflow: hidden;
            }

            #mobile-panel-scrim {
                display: block;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.3);
                opacity: 0;
                pointer-events: none;
                transition: opacity 0.25s ease;
                z-index: 28;
            }

            #mobile-panel-scrim.open {
                opacity: 1;
                pointer-events: auto;
            }

            .playlist-overlay iframe {
                height: 350px !important;
                min-height: 350px !important;
            }

            .main-container {
                position: relative;
            }

            .player-section {
                position: relative;
                z-index: 35;
            }

            .cassette-section {
                position: fixed;
                top: 86px;
                left: 10px;
                right: 10px;
                bottom: 10px;
                width: auto;
                max-width: none;
                min-width: 0;
                margin: 0;
                z-index: 30;
                transform: translateY(106%);
                opacity: 0;
                pointer-events: none;
                transition: transform 0.28s ease, opacity 0.2s ease;
            }

            .cassette-section.now-playing-open {
                transform: translateY(0);
                opacity: 1;
                pointer-events: auto;
            }

            .cassette-container {
                height: 100%;
                display: flex;
                flex-direction: column;
                padding: 12px;
            }

            .cassette-art {
                flex: 1;
                min-height: 0;
            }

            .cassette-cover {
                height: 100%;
                object-fit: cover;
            }

            .cover-note {
                display: none;
            }

            .panel-close {
                display: inline-flex;
                align-items: center;
            }

            .share-button {
                width: 100%;
                max-width: 280px;
            }

            .meta-row {
                justify-content: center;
                text-align: center;
            }
        }

        @media (max-width: 400px) {
            :root {
                --cover-overlay-top: 16.5%;
                --cover-overlay-side: 1.8%;
                --cover-overlay-bottom: 4%;
            }

            .cassette-section {
                top: 80px;
                left: 8px;
                right: 8px;
                bottom: 8px;
            }

            .playlist-overlay iframe {
                height: 350px !important;
                min-height: 350px !important;
            }

            .container__paragraph {
                font-size: 16px;
                line-height: 24px;
                margin: 0 0 10px;
            }

            .main-container {
                margin: 18px 0 8px;
                justify-content: center;
                align-items: center;
            }

            .player-section {
                width: 100%;
                max-width: 339px;
                min-width: 0;
                margin: 0 auto;
            }

            .cassette-section {
                width: auto;
                margin: 0;
            }

            .cassette-cover {
                width: 100%;
                max-width: 339px;
                height: auto;
                border-radius: 6px;
            }

            #walkman {
                display: block;
                width: 100%;
                max-width: 339px;
                margin: 0 auto;
            }

            #form {
                padding: 14px;
            }

            body {
                padding-left: 14px;
                padding-right: 14px;
            }
        }
    </style>
</head>

        <p class="container__paragraph">Paste the URL of a Spotify playlist in the field below and click play on the Walkman!</p>
        <div id="form">
            <input class="form__input" type="text" id="playlist-input" placeholder="https://open.spotify.com/playlist/..." />
            <div class="button-row">
                <button class="share-button load-button" id="load-button">Load</button>
                <button class="share-button" id="share-button">Share This Mixtape</button>
            </div>
            <div class="meta-row">
                <p class="share-feedback" id="share-feedback">Paste a playlist URL, then hit play or share.</p>
                <p class="player-status" id="player-status">Stopped</p>
            </div>
        </div>

            <g id="buttonbar"><path class="st9" d="M374.3 48.8H84.8c-3.9 0-7 3.1-7 7v21c0 3.9 3.1 7 7 7h289.5c3.9 0 7-3.1 7-7v-21c0-3.8-3.1-7-7-7z"/><path class="st10" d="M131.4 66.3l-12.5 6.8V59.6l12.5 6.7zm204.2 0l-12.5 6.8V59.6l12.5 6.7zm15 0l-12.5 6.8V59.6l12.5 6.7zm-161.2-6.7h4.3v13.6h-4.3V59.6zm7.3 0h4.3v13.6h-4.3V59.6zm61.7 0H272v13.6h-13.6V59.6z"/></g>
            <g id="rumble-toggle" transform="translate(406 356)">
                <text id="rumble-hint" x="-4" y="-22" text-anchor="middle">TAP x4oh moble</text>
                <rect id="rumble-shadow" x="-33" y="-12" width="64" height="24" rx="8"/>
                <rect id="rumble-button" x="-35" y="-14" width="64" height="24" rx="8"/>
                <text id="rumble-label" x="-3" y="-2" text-anchor="middle" dominant-baseline="middle">RUMBLE</text>
            </g>
            <g id="rumble-info" transform="translate(444 334)" tabindex="0" role="button" aria-label="Rumble help">
                <circle id="rumble-info-dot" cx="0" cy="0" r="7"/>
                <text id="rumble-info-label" x="0" y="0" text-anchor="middle" dominant-baseline="middle">i</text>
            </g>
            <g id="rumble-tooltip" transform="translate(314 286)">
                <rect id="rumble-tooltip-bg" x="0" y="0" width="150" height="48" rx="7"/>
                <text id="rumble-tooltip-text" x="8" y="14">Tap RUMBLE 4+ times to set tempo.</text>
                <text id="rumble-tooltip-text" x="8" y="26">Shake hits beat 1 every 4 beats.</text>
                <text id="rumble-tooltip-text" x="8" y="38">Tap RUMBLE once to turn off.</text>
            </g>
            <g id="leftwheel"><circle class="st11" cx="142.7" cy="273.5" r="41.6"/><circle class="st12" cx="142.7" cy="273.5" r="33.7"/><path class="st13" d="M147.7 259.2h-10.1l-4-18.1h18.1l-4 18.1zm-10.1 28.6h10.1l4 18.1h-18.1l4-18.1zm-9.2-19.4v10.2l-18.2 4v-18.2l18.2 4zm28.5 10.2v-10.2l18.2-4v18.2l-18.2-4z"/></g>
            <g id="rightwheel"><circle class="st11" cx="316.5" cy="273.5" r="41.6"/><circle class="st12" cx="316.5" cy="273.5" r="33.7"/><path class="st13" d="M321.5 259.2h-10.1l-4-18.1h18.1l-4 18.1zm-10.1 28.6h10.1l4 18.1h-18.1l4-18.1zm-9.2-19.4v10.2l-18.2 4v-18.2l18.2 4zm28.5 10.2v-10.2l18.2-4v18.2l-18.2-4z"/></g>
</g>
                </svg>
            </div>

            <div class="cassette-section">
                <div class="cassette-container">
                    <button class="panel-close" id="panel-close-button" type="button">Close</button>
                    <div class="cassette-art">
                        <img src="cassetteTapeCover.png" alt="Cassette Tape Cover" class="cassette-cover" />
                        <div class="playlist-overlay" id="playlist-overlay">
                            <iframe id="widget" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                        </div>
                    </div>
                    <p class="cover-note">Curated by you. Press play and pass it on.</p>
                </div>
            </div>
        </div>
        <div id="mobile-panel-scrim"></div>
    </div>

    <script>
        // Variables
        let wheels = document.querySelectorAll("#leftwheel,#rightwheel");
        let tape = document.querySelectorAll("#lefttape,#righttape");
        let playBtn = document.getElementById("playbutton");
        let pauseBtn = document.getElementById("pausebutton");
        let stopBtn = document.getElementById("stopbutton");
        let forwardBtn = document.getElementById("forwardbutton");
        let rumbleToggle = document.getElementById("rumble-toggle");
        let rumbleInfo = document.getElementById("rumble-info");
        let rumbleTooltip = document.getElementById("rumble-tooltip");
        let panelCloseButton = document.getElementById("panel-close-button");
        let cassetteSection = document.querySelector(".cassette-section");
        let mobilePanelScrim = document.getElementById("mobile-panel-scrim");
        let loadBtn = document.getElementById("load-button");
        let shareBtn = document.getElementById("share-button");
        let playlistInput = document.getElementById("playlist-input");
        let widget = document.getElementById("widget");
        let playlistOverlay = document.getElementById("playlist-overlay");
        let cassetteCover = document.querySelector(".cassette-cover");
        let walkmanSvg = document.getElementById("walkman");
        let shareFeedback = document.getElementById("share-feedback");
        let playerStatus = document.getElementById("player-status");
        let isPlaylistReady = false;
        let rumbleTimer = null;
        let rumbleOn = false;
        let rumbleTapTimes = [];
        let rumbleBeatMs = null;
        let rumbleTapFlashTimer = null;
        let isNowPlayingPanelOpen = false;
        const mobilePanelMedia = window.matchMedia('(max-width: 700px)');

        function setShareFeedback(message, type = "") {
            shareFeedback.textContent = message;
            shareFeedback.classList.remove("success", "error");
            if (type) {
                shareFeedback.classList.add(type);
            }
        }

        function setPlayerStatus(state) {
            playerStatus.textContent = state;
            playerStatus.classList.remove("playing");
            if (state === "Playing") {
                playerStatus.classList.add("playing");
            }
        }

        function getPlaylistId(url) {
            if (!url) return null;
            const match = url.match(/open\.spotify\.com\/playlist\/([a-zA-Z0-9]+)/);
            return match ? match[1] : null;
        }

        function setPlayReadyState(isReady) {
            isPlaylistReady = isReady;
            playBtn.classList.toggle('play-ready', isReady);
            if (!isReady) {
                playBtn.classList.remove('play-active');
            }
        }

        function setPlayActiveState(isActive) {
            playBtn.classList.toggle('play-active', isActive);
            if (isActive) {
                playBtn.classList.remove('play-ready');
            } else if (isPlaylistReady) {
                playBtn.classList.add('play-ready');
            }
        }

        function loadPlaylistFromInput(showFeedback = true) {
            const url = playlistInput.value.trim();
            const playlistId = getPlaylistId(url);

            if (!playlistId) {
                setPlayReadyState(false);
                if (showFeedback) {
                    setShareFeedback("That URL does not look like a Spotify playlist link.", "error");
                }
                return false;
            }

            const embedUrl = `https://open.spotify.com/embed/playlist/${playlistId}?utm_source=generator&autoplay=1&theme=0`;
            widget.src = embedUrl;
            widget.style.width = '100%';
            widget.style.height = '100%';
            widget.style.minHeight = '100%';
            localStorage.setItem('mixtapePlaylistUrl', url);
            setPlayReadyState(true);
            shareBtn.disabled = false;
            if (showFeedback) {
                setShareFeedback("Playlist loaded. Press play on the Walkman.", "success");
            }
            return true;
        }

        // Check for shared playlist in URL parameters
        function getPlaylistFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const sharedPlaylist = urlParams.get('playlist');
            if (sharedPlaylist) {
                return decodeURIComponent(sharedPlaylist);
            }
            const savedPlaylist = localStorage.getItem('mixtapePlaylistUrl');
            if (savedPlaylist) {
                return savedPlaylist;
            }
            return "https://open.spotify.com/album/31TKYpO01dIZRUo8rypDSD?si=6OGZsXgmQgqlPZ0ak5sE1Q";
        }

        // Set playlist from URL or default
        playlistInput.value = getPlaylistFromURL();
        loadPlaylistFromInput(false);

        // GSAP animations
        let slideTape = gsap.to(tape, {
            duration: 20,
            x: -20,
            ease: "none",
            repeat: -1,
            paused: true,
            yoyo: true
        });

        let movePlayBtn = gsap.to(playBtn, {
            duration: 0.1,
            scaleY: 0.6,
            transformOrigin: "0 100%",
            ease: "sine.in",
            paused: true
        });

        let movePauseBtn = gsap.to(pauseBtn, {
            duration: 0.1,
            scaleY: 0.6,
            transformOrigin: "0 100%",
            ease: "sine.in",
            paused: true
        });

        let moveStopBtn = gsap.to(stopBtn, {
            duration: 0.1,
            scaleY: 0.6,
            transformOrigin: "0 100%",
            ease: "sine.in",
            paused: true
        });

        let rotateWheels = gsap.to(wheels, {
            duration: 4,
            rotation: "360",
            transformOrigin: "50% 50%",
            ease: "none",
            repeat: -1,
            paused: true
        });

        // Functions
        function updatePlaylistFromInput() {
            let url = playlistInput.value.trim();
            setPlayReadyState(false);
            if (url.length > 0) {
                setShareFeedback("Press Load to prepare this playlist.", "");
            } else {
                setShareFeedback("Paste a playlist URL, then hit play or share.");
            }
        }

        function startAnimation() {
            slideTape.timeScale(1);
            slideTape.play();
            rotateWheels.timeScale(1);
            rotateWheels.play();
        }

        function stopAnimation() {
            slideTape.timeScale(0);
            rotateWheels.timeScale(0);
        }

        function triggerRumble() {
            gsap.fromTo(walkmanSvg,
                { x: -3, y: 0 },
                {
                    x: 3,
                    duration: 0.08,
                    repeat: 5,
                    yoyo: true,
                    ease: "power1.inOut",
                    onComplete: () => gsap.set(walkmanSvg, { x: 0, y: 0 })
                }
            );
        }

        function setRumbleState(enabled) {
            rumbleOn = enabled;
            rumbleToggle.classList.toggle('rumble-on', enabled);

            if (rumbleTimer) {
                clearInterval(rumbleTimer);
                rumbleTimer = null;
            }

            if (enabled) {
                if (rumbleBeatMs) {
                    triggerRumble();
                    rumbleTimer = setInterval(triggerRumble, rumbleBeatMs * 4);
                }
            } else {
                gsap.set(walkmanSvg, { x: 0, y: 0 });
                rumbleTapTimes = [];
                rumbleBeatMs = null;
            }
        }

        function setRumbleTempoFromTaps() {
            if (rumbleTapTimes.length < 4) return false;

            const deltas = [];
            for (let i = 1; i < rumbleTapTimes.length; i++) {
                const delta = rumbleTapTimes[i] - rumbleTapTimes[i - 1];
                if (delta >= 120 && delta <= 8000) {
                    deltas.push(delta);
                }
            }

            if (deltas.length === 0) return false;

            const avgDelta = deltas.reduce((sum, delta) => sum + delta, 0) / deltas.length;
            rumbleBeatMs = Math.round(avgDelta);
            setRumbleState(true);
            return true;
        }

        function setRumbleEnabled(enabled) {
            rumbleToggle.classList.toggle('rumble-disabled', !enabled);
        }

        function setRumbleTooltip(open) {
            rumbleTooltip.classList.toggle('open', open);
        }

        function isMobilePanelView() {
            return mobilePanelMedia.matches;
        }

        function openNowPlayingPanel() {
            if (!isMobilePanelView()) return;
            cassetteSection.classList.add('now-playing-open');
            mobilePanelScrim.classList.add('open');
            document.body.classList.add('mobile-panel-open');
            isNowPlayingPanelOpen = true;
        }

        function closeNowPlayingPanel() {
            cassetteSection.classList.remove('now-playing-open');
            mobilePanelScrim.classList.remove('open');
            document.body.classList.remove('mobile-panel-open');
            isNowPlayingPanelOpen = false;
        }

        function showNowPlayingSurface() {
            playlistOverlay.style.display = 'block';
            cassetteCover.classList.add('is-blurred');
            openNowPlayingPanel();
        }

        function hideNowPlayingSurface() {
            playlistOverlay.style.display = 'none';
            cassetteCover.classList.remove('is-blurred');
            closeNowPlayingPanel();
        }

        function resetAnimation() {
            slideTape.progress(0);
            slideTape.timeScale(0);
            rotateWheels.progress(0);
            rotateWheels.timeScale(0);
        }

        // Spotify iframe control functions
        function sendSpotifyCommand(command) {
            try {
                const iframe = document.getElementById('widget');
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({
                        command: command
                    }, '*');
                }
            } catch (e) {
                console.log('Spotify control not available');
            }
        }

        // Event listeners
        playBtn.onclick = function() {
            movePlayBtn.play();
            movePauseBtn.reverse();
            moveStopBtn.reverse();

            if (!isPlaylistReady) {
                setShareFeedback("Press Load first, then press play.", "error");
                return;
            }
            showNowPlayingSurface();
            startAnimation();
            setPlayerStatus("Playing");
            setPlayActiveState(true);
            setRumbleEnabled(true);

            // Auto-play the Spotify playlist
            setTimeout(() => {
                sendSpotifyCommand('play');
            }, 1000); // Wait for iframe to load
        }

        pauseBtn.onclick = function() {
            movePauseBtn.play();
            movePlayBtn.reverse();
            moveStopBtn.reverse();

            stopAnimation();
            setPlayerStatus("Paused");
            setPlayActiveState(true);
            sendSpotifyCommand('pause');
        }

        stopBtn.onclick = function() {
            moveStopBtn.play();
            movePlayBtn.reverse();
            movePauseBtn.reverse();

            hideNowPlayingSurface();
            resetAnimation();
            setPlayerStatus("Stopped");
            setPlayActiveState(false);
            setRumbleState(false);
            setRumbleEnabled(false);
            sendSpotifyCommand('pause');
        }

        forwardBtn.onclick = function() {
            setShareFeedback("Fast-forward is not mapped yet. Use play, pause, stop, and share.", "error");
        }

        rumbleToggle.onclick = function() {
            if (rumbleToggle.classList.contains('rumble-disabled')) return;

            if (rumbleOn) {
                setRumbleState(false);
                return;
            }

            const now = Date.now();
            if (rumbleTapTimes.length > 0 && now - rumbleTapTimes[rumbleTapTimes.length - 1] > 10000) {
                rumbleTapTimes = [];
            }

            rumbleToggle.classList.add('rumble-tap-flash');
            if (rumbleTapFlashTimer) {
                clearTimeout(rumbleTapFlashTimer);
            }
            rumbleTapFlashTimer = setTimeout(() => {
                rumbleToggle.classList.remove('rumble-tap-flash');
            }, 180);

            rumbleTapTimes.push(now);
            if (rumbleTapTimes.length > 6) {
                rumbleTapTimes.shift();
            }

            const lockedTempo = setRumbleTempoFromTaps();
            if (!lockedTempo) return;
        }

        rumbleInfo.addEventListener('mouseenter', function() {
            setRumbleTooltip(true);
        });

        rumbleInfo.addEventListener('mouseleave', function() {
            setRumbleTooltip(false);
        });

        rumbleInfo.addEventListener('focus', function() {
            setRumbleTooltip(true);
        });

        rumbleInfo.addEventListener('blur', function() {
            setRumbleTooltip(false);
        });

        rumbleInfo.addEventListener('click', function(event) {
            event.preventDefault();
            event.stopPropagation();
            setRumbleTooltip(!rumbleTooltip.classList.contains('open'));
        });

        document.addEventListener('click', function(event) {
            if (!rumbleInfo.contains(event.target)) {
                setRumbleTooltip(false);
            }
        });

        panelCloseButton.addEventListener('click', function() {
            hideNowPlayingSurface();
            setShareFeedback("Now playing panel closed.", "");
        });

        mobilePanelScrim.addEventListener('click', function() {
            hideNowPlayingSurface();
        });

        // Share functionality
        loadBtn.addEventListener('click', function() {
            loadPlaylistFromInput(true);
        });

        shareBtn.addEventListener('click', function() {
            const playlistUrl = playlistInput.value.trim();
            if (getPlaylistId(playlistUrl)) {
                const shareUrl = `${window.location.origin}${window.location.pathname}?playlist=${encodeURIComponent(playlistUrl)}`;

                navigator.clipboard.writeText(shareUrl).then(() => {
                    setShareFeedback("Mixtape link copied. Share it anywhere.", "success");
                }).catch(() => {
                    prompt('Copy this link to share your mixtape:', shareUrl);
                    setShareFeedback("Copy dialog opened. Share your mixtape link.", "success");
                });
            } else {
                setShareFeedback("Please enter a valid Spotify playlist URL first.", "error");
            }
        });

        // Update playlist when input changes
        playlistInput.addEventListener('input', updatePlaylistFromInput);
        playlistInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                loadPlaylistFromInput(true);
                if (playlistOverlay.style.display === 'block') {
                    startAnimation();
                }
            }
        });

        window.addEventListener('beforeunload', function() {
            if (rumbleTimer) {
                clearInterval(rumbleTimer);
            }
        });

        mobilePanelMedia.addEventListener('change', function() {
            if (!isMobilePanelView()) {
                mobilePanelScrim.classList.remove('open');
                document.body.classList.remove('mobile-panel-open');
                cassetteSection.classList.remove('now-playing-open');
                isNowPlayingPanelOpen = false;
            } else if (playerStatus.textContent === "Playing" && playlistOverlay.style.display === 'block') {
                openNowPlayingPanel();
            }
        });

        setRumbleEnabled(false);
    </script>
</body>
</html>

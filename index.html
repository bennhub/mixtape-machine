<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixtape - Spotify Walkman</title>
    <link href="https://fonts.googleapis.com/css2?family=Luckiest+Guy&family=Muli:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            background-image: linear-gradient(to right, #fdfbfb 0%, #ebedee 100%);
            padding: 20px;
            margin: 0;
            font-family: 'Muli', sans-serif;
        }

        iframe {
            display: none;
            border-radius: 8px;
        }

        .main-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 40px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .player-section {
            flex: 1;
            min-width: 400px;
        }

        .cassette-section {
            flex: 1;
            min-width: 400px;
        }

        .cassette-container {
            position: relative;
            width: 100%;
        }

        .cassette-cover {
            width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .playlist-overlay {
            position: absolute;
            top: 8%;
            left: 6%;
            right: 6%;
            bottom: 8%;
            background: rgba(0,0,0,0.05);
            border-radius: 6px;
            padding: 0;
            display: none;
            overflow: hidden;
        }

        .playlist-overlay iframe {
            width: 100% !important;
            height: 100% !important;
            max-height: 100% !important;
            display: block;
            border-radius: 6px;
            border: none;
        }

        #walkman {
            width: 100%;
            max-width: 800px;
        }

        #forwardbutton, #playbutton, #pausebutton, #stopbutton {
            cursor: pointer;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            text-align: center;
        }

        .container__header {
            background-image: linear-gradient(135deg, #FCCF31 0%, #F55555 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            font-family: 'Luckiest Guy', cursive;
            font-size: 72px;
            margin: 20px 0 10px;
        }

        .container__paragraph {
            color: #333333;
            max-width: 750px;
            font-family: 'Muli', sans-serif;
            font-size: 18px;
            line-height: 30px;
            margin: 0;
        }

        .form__input {
            padding: 16px 10px;
            color: #333333;
            border: none;
            width: 600px;
            text-align: center;
            margin: 20px 0 40px;
            font-size: 18px;
            outline: #FCCF31 dashed 3px;
            outline-offset: -2px;
            transition: all .2s ease-in;
        }

        .form__input:focus {
            outline: #F55555 dashed 3px;
        }

        @media (max-width: 900px) {
            .main-container {
                flex-direction: column;
                align-items: center;
                padding: 0 10px;
            }

            .player-section {
                min-width: auto;
            }

            .cassette-section {
                flex: none;
                margin-top: 20px;
                width: 100%;
                max-width: 500px;
            }

            .playlist-overlay {
                top: 15%;
                left: 8%;
                right: 8%;
                bottom: 15%;
            }
        }

        @media (max-width: 700px) {
            .form__input {
                width: 340px;
            }
            .container__header {
                font-size: 48px;
            }

            .main-container {
                padding: 0 5px;
            }

            .cassette-section {
                max-width: 400px;
            }

            .playlist-overlay {
                top: 18%;
                left: 10%;
                right: 10%;
                bottom: 18%;
            }
        }

        @media (max-width: 400px) {
            .form__input {
                width: 280px;
            }
            .container__header {
                font-size: 36px;
                margin: 10px 0 5px;
            }

            .container__paragraph {
                font-size: 16px;
                line-height: 24px;
                margin: 0 0 10px;
            }

            .main-container {
                padding: 0 8px;
                margin: 20px 0;
                gap: 20px;
            }

            .cassette-section {
                max-width: 350px;
                width: 100%;
            }

            .playlist-overlay {
                top: 20%;
                left: 12%;
                right: 12%;
                bottom: 20%;
            }

            .cassette-cover {
                border-radius: 6px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h2 class="container__header">Your Mix Taps</h2>
        <p class="container__paragraph">Paste the URL of a Spotify playlist in the field below and click play on the Walkman!</p>
        <div id="form">
            <input class="form__input" type="text" id="playlist-input" placeholder="https://open.spotify.com/playlist/..." />
        </div>

        <div class="main-container">
            <div class="player-section">
                <svg id="walkman" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 500 400">
            <style>.st0{fill:#fabf2e}.st1{fill:#2e2e2e}.st2{fill:#d1d3d4}.st3{fill:#fff}.st4{fill:#a7a9ac}.st5{clip-path:url(#SVGID_3_)}.st6{clip-path:url(#SVGID_4_)}.st7{clip-path:url(#SVGID_7_)}.st8{clip-path:url(#SVGID_8_)}.st9{fill:#3a3b3a}.st10{fill:#818182}.st11{fill:#e6e7e8}.st12{fill:#fff;stroke:#58595b;stroke-width:3;stroke-miterlimit:10}.st13{fill:#58595b}.st14{fill:#6d6e71}.st15{fill:#7b7b7b}.st16{fill:#cdd0d6}.st17{fill:#414042}.st18{fill:#cccdce}.st19{fill:#f9be2c}</style>
            <g id="wbody"><path class="st0" d="M424.1 392H35c-19.3 0-35-15.7-35-35V102.8c0-19.3 15.7-35 35-35h389.1c19.3 0 35 15.7 35 35V357c0 19.3-15.7 35-35 35z"/><path class="st1" d="M424.1 392H35c-19.3 0-35-15.7-35-35v-39.5c0-3.9 2.8-7.2 6.6-7.9l32.1-5.8c7.3-1.3 13.2-6.5 15.5-13.5l29.5-87.7c3.5-10.7 13.5-17.9 24.7-17.9h242.4c11.2 0 21.2 7.2 24.7 17.9l29.5 87.7c2.3 7 8.2 12.2 15.5 13.5l32.1 5.8c3.8.7 6.6 4 6.6 7.9V357c-.1 19.3-15.8 35-35.1 35z"/><path class="st2" d="M95.9 333.3c-6 0-11.5-2.7-15.3-7.4s-5.1-10.7-3.7-16.5l18.7-80.6c2.1-8.9 9.9-15.1 19-15.1h229.9c9.1 0 16.9 6.2 19 15.1l18.7 80.6c1.4 5.8 0 11.9-3.7 16.5s-9.3 7.4-15.3 7.4H95.9z"/><path d="M114.6 216.2h229.9c7.9 0 14.8 5.5 16.6 13.2l18.7 80.6c2.5 10.7-5.6 20.8-16.6 20.8H95.9c-10.9 0-19-10.2-16.6-20.8L98 229.3c1.8-7.7 8.7-13.1 16.6-13.1m0-5c-10.3 0-19.1 7-21.4 17l-18.7 80.6c-1.5 6.6 0 13.4 4.2 18.7 4.2 5.3 10.5 8.3 17.2 8.3h267.4c6.7 0 13-3 17.2-8.3 4.2-5.3 5.7-12.1 4.2-18.7L366 228.2c-2.3-10-11.1-17-21.4-17h-230z"/>
            <g id="tapebg"><path class="st3" d="M193.6 295.1c-2.2 0-4-1.8-4-4v-35.3c0-2.2 1.8-4 4-4h71.8c2.2 0 4 1.8 4 4v35.3c0 2.2-1.8 4-4 4h-71.8z"/><path class="st4" d="M265.5 252.9c1.7 0 3 1.3 3 3v35.3c0 1.7-1.3 3-3 3h-71.8c-1.7 0-3-1.3-3-3v-35.3c0-1.7 1.3-3 3-3h71.8m0-2h-71.8c-2.8 0-5 2.2-5 5v35.3c0 2.8 2.2 5 5 5h71.8c2.8 0 5-2.2 5-5v-35.3c0-2.8-2.3-5-5-5z"/></g>
            </g>
            <g id="tape">
            <circle id="lefttape" class="st5" cx="178.2" cy="273.5" r="45.5"/>
            <circle id="righttape" class="st5" cx="309" cy="273.5" r="45.5"/>
            </g>
            <path class="st2" d="M379.8 309.9l-18.7-80.6c-1.8-7.7-8.7-13.2-16.6-13.2h-115v36.7h35.9c1.7 0 3 1.3 3 3v35.3c0 1.7-1.3 3-3 3h-35.9v36.7h133.7c11 0 19.1-10.2 16.6-20.9z" id="rightmask"/><path class="st2" d="M79.3 309.9L98 229.3c1.8-7.7 8.7-13.2 16.6-13.2h115v36.7h-35.9c-1.7 0-3 1.3-3 3v35.3c0 1.7 1.3 3 3 3h35.9v36.7H95.9c-11 0-19.1-10.2-16.6-20.9z" id="leftmask"/><path class="st4" d="M265.5 252.8c1.7 0 3 1.3 3 3v35.3c0 1.7-1.3 3-3 3h-71.8c-1.7 0-3-1.3-3-3v-35.3c0-1.7 1.3-3 3-3h71.8m0-2h-71.8c-2.8 0-5 2.2-5 5v35.3c0 2.8 2.2 5 5 5h71.8c2.8 0 5-2.2 5-5v-35.3c0-2.7-2.3-5-5-5z" id="tapestroke"/>
            <path id="playbutton" d="M148.7 51.6h-47.2c-1.7 0-3-1.3-3-3V31.3c0-1.7 1.3-3 3-3h47.2c1.7 0 3 1.3 3 3v17.3c0 1.7-1.3 3-3 3z"/>
            <path id="pausebutton" d="M218.8 51.6h-47.2c-1.7 0-3-1.3-3-3V31.3c0-1.7 1.3-3 3-3h47.2c1.7 0 3 1.3 3 3v17.3c0 1.7-1.4 3-3 3z"/>
            <path id="stopbutton" d="M288.8 51.6h-47.2c-1.7 0-3-1.3-3-3V31.3c0-1.7 1.3-3 3-3h47.2c1.7 0 3 1.3 3 3v17.3c0 1.7-1.3 3-3 3z"/>
            <path id="forwardbutton" d="M358.8 51.6h-47.2c-1.7 0-3-1.3-3-3V31.3c0-1.7 1.3-3 3-3h47.2c1.7 0 3 1.3 3 3v17.3c0 1.7-1.3 3-3 3z"/>
            <g id="buttonbar"><path class="st9" d="M374.3 48.8H84.8c-3.9 0-7 3.1-7 7v21c0 3.9 3.1 7 7 7h289.5c3.9 0 7-3.1 7-7v-21c0-3.8-3.1-7-7-7z"/><path class="st10" d="M131.4 66.3l-12.5 6.8V59.6l12.5 6.7zm204.2 0l-12.5 6.8V59.6l12.5 6.7zm15 0l-12.5 6.8V59.6l12.5 6.7zm-161.2-6.7h4.3v13.6h-4.3V59.6zm7.3 0h4.3v13.6h-4.3V59.6zm61.7 0H272v13.6h-13.6V59.6z"/></g>
            <g id="leftwheel"><circle class="st11" cx="142.7" cy="273.5" r="41.6"/><circle class="st12" cx="142.7" cy="273.5" r="33.7"/><path class="st13" d="M147.7 259.2h-10.1l-4-18.1h18.1l-4 18.1zm-10.1 28.6h10.1l4 18.1h-18.1l4-18.1zm-9.2-19.4v10.2l-18.2 4v-18.2l18.2 4zm28.5 10.2v-10.2l18.2-4v18.2l-18.2-4z"/></g>
            <g id="rightwheel"><circle class="st11" cx="316.5" cy="273.5" r="41.6"/><circle class="st12" cx="316.5" cy="273.5" r="33.7"/><path class="st13" d="M321.5 259.2h-10.1l-4-18.1h18.1l-4 18.1zm-10.1 28.6h10.1l4 18.1h-18.1l4-18.1zm-9.2-19.4v10.2l-18.2 4v-18.2l18.2 4zm28.5 10.2v-10.2l18.2-4v18.2l-18.2-4z"/></g>
</g>
                </svg>
            </div>

            <div class="cassette-section">
                <div class="cassette-container">
                    <img src="cassetteTapeCover.png" alt="Cassette Tape Cover" class="cassette-cover" />
                    <div class="playlist-overlay" id="playlist-overlay">
                        <iframe id="widget" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Variables
        let wheels = document.querySelectorAll("#leftwheel,#rightwheel");
        let tape = document.querySelectorAll("#lefttape,#righttape");
        let playBtn = document.getElementById("playbutton");
        let pauseBtn = document.getElementById("pausebutton");
        let stopBtn = document.getElementById("stopbutton");
        let forwardBtn = document.getElementById("forwardbutton");
        let playlistInput = document.getElementById("playlist-input");
        let widget = document.getElementById("widget");
        let playlistOverlay = document.getElementById("playlist-overlay");

        // Set default playlist
        playlistInput.value = "https://open.spotify.com/playlist/5TZkls9cEOzWDR6qCxwDot";
        updatePlaylistFromInput();

        // GSAP animations
        let slideTape = gsap.to(tape, {
            duration: 20,
            x: -20,
            ease: "none",
            repeat: -1,
            paused: true,
            yoyo: true
        });

        let movePlayBtn = gsap.to(playBtn, {
            duration: 0.1,
            scaleY: 0.6,
            transformOrigin: "0 100%",
            ease: "sine.in",
            paused: true
        });

        let movePauseBtn = gsap.to(pauseBtn, {
            duration: 0.1,
            scaleY: 0.6,
            transformOrigin: "0 100%",
            ease: "sine.in",
            paused: true
        });

        let moveStopBtn = gsap.to(stopBtn, {
            duration: 0.1,
            scaleY: 0.6,
            transformOrigin: "0 100%",
            ease: "sine.in",
            paused: true
        });

        let rotateWheels = gsap.to(wheels, {
            duration: 4,
            rotation: "360",
            transformOrigin: "50% 50%",
            ease: "none",
            repeat: -1,
            paused: true
        });

        // Functions
        function updatePlaylistFromInput() {
            let url = playlistInput.value.trim();
            if (url && url.includes('open.spotify.com/playlist/')) {
                let playlistId = url.split('/playlist/')[1].split('?')[0];
                let embedUrl = `https://open.spotify.com/embed/playlist/${playlistId}?utm_source=generator&autoplay=1&theme=0`;
                widget.src = embedUrl;
            }
        }

        function startAnimation() {
            slideTape.timeScale(1);
            slideTape.play();
            rotateWheels.timeScale(1);
            rotateWheels.play();
        }

        function stopAnimation() {
            slideTape.timeScale(0);
            rotateWheels.timeScale(0);
        }

        function resetAnimation() {
            slideTape.progress(0);
            slideTape.timeScale(0);
            rotateWheels.progress(0);
            rotateWheels.timeScale(0);
        }

        // Spotify iframe control functions
        function sendSpotifyCommand(command) {
            try {
                const iframe = document.getElementById('widget');
                if (iframe && iframe.contentWindow) {
                    iframe.contentWindow.postMessage({
                        command: command
                    }, '*');
                }
            } catch (e) {
                console.log('Spotify control not available');
            }
        }

        // Event listeners
        playBtn.onclick = function() {
            movePlayBtn.play();
            movePauseBtn.reverse();
            moveStopBtn.reverse();

            updatePlaylistFromInput();
            playlistOverlay.style.display = 'block';
            startAnimation();

            // Auto-play the Spotify playlist
            setTimeout(() => {
                sendSpotifyCommand('play');
            }, 1000); // Wait for iframe to load
        }

        pauseBtn.onclick = function() {
            movePauseBtn.play();
            movePlayBtn.reverse();
            moveStopBtn.reverse();

            stopAnimation();
            sendSpotifyCommand('pause');
        }

        stopBtn.onclick = function() {
            moveStopBtn.play();
            movePlayBtn.reverse();
            movePauseBtn.reverse();

            playlistOverlay.style.display = 'none';
            resetAnimation();
            sendSpotifyCommand('pause');
        }

        // Update playlist when input changes
        playlistInput.addEventListener('input', updatePlaylistFromInput);
        playlistInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                updatePlaylistFromInput();
                if (playlistOverlay.style.display === 'block') {
                    startAnimation();
                }
            }
        });
    </script>
</body>
</html>
